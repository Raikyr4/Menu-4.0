<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Earth.TEC - Login</title>
    <link rel="stylesheet" href="../../libs/reset.css">
    <link rel="stylesheet" type="text/css" href="css/login.css">
    <script src="../../libs/jquery.js"></script>
</head>
<body>
    <main>
        <div class="section">
            <div class="container">
                <div class="row full-height justify-content-center">
                    <div class="col-12 text-center align-self-center py-5">
                        <div class="section pb-5 pt-5 pt-sm-2 text-center">
                            <h6 class="mb-0 pb-3">
                                <span>Login</span>
                                <span>Sign Up</span>
                            </h6>
                            <input type="checkbox" class="checkbox" id="reg-log" name="reg-log">
                            <label for="reg-log"></label>
                            <div class="card-3d-wrap mx-auto">
                                <div class="card-3d-wrapper">
                                    <div class="card-front">
                                        <div class="center-wrap">
                                            <div class="section text-center">
                                                <h4 class="mb-4 pb-3">Login</h4>
                                                <div class="form-group">
                                                    <input type="email" name="logusername" class="form-style" placeholder="Seu Username" id="username_L" autocomplete="off">
                                                    <i class="input-icon uil uil-at"></i>
                                                </div>
                                                <div class="form-group mt-2">
                                                    <input type="password" name="logpass" class="form-style" placeholder="Sua Senha" id="password_L" autocomplete="off">
                                                    <i class="input-icon uil uil-lock-alt"></i>
                                                </div>
                                                <a href="#" class="btn mt-4" onclick="Login();">Entrar</a>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="card-back">
                                        <div class="center-wrap">
                                            <div class="section text-center">
                                                <h4 class="mb-4 pb-3 down">Sign up</h4>
                                                <div class="form-group">
                                                    <input type="text" name="logname" class="form-style" placeholder="Seu Nome Completo" id="nome_C" autocomplete="off" value="">
                                                    <i class="input-icon uil uil-user"></i>
                                                </div>
                                                <div class="form-group mt-2">
                                                    <input type="email" name="logusername" class="form-style" placeholder="Seu Username" id="username_C" autocomplete="off" value="">
                                                    <i class="input-icon uil uil-at"></i>
                                                </div>
                                                <div class="form-group mt-2">
                                                    <input type="password" name="logpass" class="form-style" placeholder="Sua Senha" id="password_C" autocomplete="off" value="">
                                                    <i class="input-icon uil uil-lock-alt"></i>
                                                </div>
                                                <a href="#" class="btn mt-4" onclick="Cadastrar();">Cadastrar</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
        <script src="js/login.js"></script>
    </main>
</body>
</html>
